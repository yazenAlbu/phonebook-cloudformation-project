AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Stage 2 of the Phonebook project: an Application Load Balancer,
  an Auto Scaling group of Flask/Gunicorn web instances, and a private
  Amazon RDS MySQL database.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC used by the load balancer, EC2 instances, and RDS.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two public subnets in different Availability Zones.

  GitRepoUrl:
    Type: String
    Default: https://github.com/yazenAlbu/phonebook-cloudformation-project.git
    Description: Public Git repository containing the Flask application.

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t4g.micro

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64

Resources:
  FlaskSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Secret key used by the Flask application.
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: phonebook-cloudformation-project

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow public HTTP traffic to the Application Load Balancer.
      VpcId:
        Ref: VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: phonebook-stage2-alb-sg
        - Key: Project
          Value: phonebook-cloudformation-project

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic only from the Application Load Balancer.
      VpcId:
        Ref: VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId:
            Ref: LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: phonebook-stage2-web-sg
        - Key: Project
          Value: phonebook-cloudformation-project

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL only from the Phonebook EC2 security group.
      VpcId:
        Ref: VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId:
            Ref: WebSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: phonebook-stage2-db-sg
        - Key: Project
          Value: phonebook-cloudformation-project

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets used by the Phonebook RDS database.
      SubnetIds:
        Ref: PublicSubnetIds
      Tags:
        - Key: Project
          Value: phonebook-cloudformation-project

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: mysql
      DBInstanceClass:
        Ref: DBInstanceClass
      AllocatedStorage: "20"
      StorageType: gp3
      StorageEncrypted: true
      DBName: phonebook_db
      MasterUsername: phonebookadmin
      ManageMasterUserPassword: true
      Port: 3306
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 0
      DeleteAutomatedBackups: true
      DeletionProtection: false
      AutoMinorVersionUpgrade: true
      DBSubnetGroupName:
        Ref: DatabaseSubnetGroup
      VPCSecurityGroups:
        - Fn::GetAtt:
            - DatabaseSecurityGroup
            - GroupId
      Tags:
        - Key: Name
          Value: phonebook-stage2-db
        - Key: Project
          Value: phonebook-cloudformation-project

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ReadPhonebookSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - Ref: FlaskSecret
                  - Fn::GetAtt:
                      - Database
                      - MasterUserSecret.SecretArn
      Tags:
        - Key: Project
          Value: phonebook-cloudformation-project

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - Ref: EC2Role

  WebLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId:
          Ref: LatestAmiId
        InstanceType:
          Ref: InstanceType
        IamInstanceProfile:
          Name:
            Ref: EC2InstanceProfile
        SecurityGroupIds:
          - Ref: WebSecurityGroup
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
        UserData:
          Fn::Base64:
            Fn::Sub: |
              #!/bin/bash
              set -euo pipefail

              dnf install -y git nginx jq python3.11 python3.11-pip

              rm -rf /opt/phonebook-app
              git clone --depth 1 "${GitRepoUrl}" /opt/phonebook-app

              python3.11 -m venv /opt/phonebook-app/venv
              /opt/phonebook-app/venv/bin/pip install --upgrade pip
              /opt/phonebook-app/venv/bin/pip install -r /opt/phonebook-app/requirements.txt

              chown -R ec2-user:ec2-user /opt/phonebook-app

              cat > /usr/local/bin/phonebook-start.sh <<'SCRIPT'
              #!/bin/bash
              set -euo pipefail

              DB_SECRET="$(aws secretsmanager get-secret-value \
                --secret-id '${Database.MasterUserSecret.SecretArn}' \
                --region '${AWS::Region}' \
                --query SecretString \
                --output text)"

              export DB_HOST='${Database.Endpoint.Address}'
              export DB_PORT='3306'
              export DB_NAME='phonebook_db'
              export DB_USER="$(printf '%s' "$DB_SECRET" | jq -r '.username')"
              export DB_PASSWORD="$(printf '%s' "$DB_SECRET" | jq -r '.password')"
              export DEVELOPER_NAME='Yazen Albu'
              export APP_PORT='5000'
              export FLASK_DEBUG='false'
              export APP_SECRET_KEY="$(aws secretsmanager get-secret-value \
                --secret-id '${FlaskSecret}' \
                --region '${AWS::Region}' \
                --query SecretString \
                --output text)"

              cd /opt/phonebook-app
              /opt/phonebook-app/venv/bin/python /opt/phonebook-app/init_db.py

              exec /opt/phonebook-app/venv/bin/gunicorn \
                --workers 2 \
                --bind 127.0.0.1:5000 \
                app:app
              SCRIPT

              chmod 755 /usr/local/bin/phonebook-start.sh

              cat > /etc/systemd/system/phonebook.service <<'SERVICE'
              [Unit]
              Description=Phonebook Flask application
              Wants=network-online.target
              After=network-online.target

              [Service]
              Type=simple
              User=ec2-user
              Group=ec2-user
              WorkingDirectory=/opt/phonebook-app
              ExecStart=/usr/local/bin/phonebook-start.sh
              Restart=always
              RestartSec=10

              [Install]
              WantedBy=multi-user.target
              SERVICE

              cat > /etc/nginx/nginx.conf <<'NGINX'
              user nginx;
              worker_processes auto;
              error_log /var/log/nginx/error.log notice;
              pid /run/nginx.pid;

              events {
                  worker_connections 1024;
              }

              http {
                  include /etc/nginx/mime.types;
                  default_type application/octet-stream;
                  sendfile on;

                  server {
                      listen 80 default_server;
                      server_name _;

                      location / {
                          proxy_pass http://127.0.0.1:5000;
                          proxy_set_header Host $host;
                          proxy_set_header X-Real-IP $remote_addr;
                          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                          proxy_set_header X-Forwarded-Proto $scheme;
                      }
                  }
              }
              NGINX

              nginx -t
              systemctl daemon-reload
              systemctl enable phonebook nginx
              systemctl restart phonebook nginx

      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: Name
              Value: phonebook-stage2-launch-template
            - Key: Project
              Value: phonebook-cloudformation-project

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name:
        Fn::Sub: phonebook-${AWS::StackName}-tg
      VpcId:
        Ref: VpcId
      Port: 80
      Protocol: HTTP
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Project
          Value: phonebook-cloudformation-project

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - Ref: LoadBalancerSecurityGroup
      Subnets:
        Ref: PublicSubnetIds
      Tags:
        - Key: Name
          Value: phonebook-stage2-alb
        - Key: Project
          Value: phonebook-cloudformation-project

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn:
        Ref: ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn:
            Ref: WebTargetGroup

  WebAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      - HttpListener
    Properties:
      VPCZoneIdentifier:
        Ref: PublicSubnetIds
      MinSize: "1"
      MaxSize: "3"
      DesiredCapacity: "2"
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      TargetGroupARNs:
        - Ref: WebTargetGroup
      LaunchTemplate:
        LaunchTemplateId:
          Ref: WebLaunchTemplate
        Version:
          Fn::GetAtt:
            - WebLaunchTemplate
            - LatestVersionNumber
      Tags:
        - Key: Name
          Value: phonebook-stage2-web
          PropagateAtLaunch: true
        - Key: Project
          Value: phonebook-cloudformation-project
          PropagateAtLaunch: true

  CpuScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName:
        Ref: WebAutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 60.0
        DisableScaleIn: false

Outputs:
  WebsiteURL:
    Description: Application Load Balancer URL for the Phonebook website.
    Value:
      Fn::Sub: http://${ApplicationLoadBalancer.DNSName}

  LoadBalancerDNSName:
    Description: DNS name of the Application Load Balancer.
    Value:
      Fn::GetAtt:
        - ApplicationLoadBalancer
        - DNSName

  AutoScalingGroupName:
    Description: Name of the web Auto Scaling group.
    Value:
      Ref: WebAutoScalingGroup

  RDSEndpoint:
    Description: Private RDS endpoint.
    Value:
      Fn::GetAtt:
        - Database
        - Endpoint.Address